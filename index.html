<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Sber Terminal</title>
    <style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
    }
    #video-background {
        position: fixed;
        top: 50%;
        left: 50%;
        min-width: 100%;
        min-height: 100%;
        width: auto;
        height: auto;
        transform: translate(-50%, -50%); /* Центрирует видео */
        object-fit: cover; /* Заполняет экран. Если обрезает - смени на 'contain' */
    }
</style>
</head>
<body>

    <video id="video-background" autoplay loop muted playsinline>
        <source src="animation.MP4" type="video/mp4">
    </video>

    <script>
        // Дополнительная защита: перезапуск видео, если оно остановилось
        const video = document.getElementById('video-background');
        video.addEventListener('ended', () => {
            video.play();
        });
    </script>
</body>
</html>
